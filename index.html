<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <TITLE>Community sonic-mgmt Test Results</TITLE>

    <style>
        /* --- Theme tokens (QPN-style) --- */
        .dark {
            --surface-0: #0f1117;
            --surface-1: #161922;
            --surface-2: #1e2130;
            --surface-3: #272b3b;
            --border: #2e3348;
            --border-hover: #3d4466;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-green: #4ead7a;
            --accent-red: #d65d5d;
            --accent-yellow: #c9a227;
            --accent-orange: #d98a4e;
            --accent-blue: #5a84d6;
            --row-alt: rgba(255,255,255,0.02);
            --row-fail: rgba(214, 93, 93, 0.12);
        }
        .light {
            --surface-0: #eef0f4;
            --surface-1: #f6f7f9;
            --surface-2: #ebedf2;
            --surface-3: #dfe2e8;
            --border: #c5c9d2;
            --border-hover: #8b92a0;
            --text-primary: #111827;
            --text-secondary: #374151;
            --text-muted: #5b6370;
            --accent-green: #2d8659;
            --accent-red: #b84444;
            --accent-yellow: #8a7118;
            --accent-orange: #b06a30;
            --accent-blue: #4570c4;
            --row-alt: rgba(0,0,0,0.025);
            --row-fail: rgba(184, 68, 68, 0.10);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: var(--surface-0);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 13px;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Header --- */
        header.topbar {
            flex-shrink: 0;
            background: var(--surface-1);
            border-bottom: 1px solid var(--border);
            padding: 10px 24px;
        }
        .topbar-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .page-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-title .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-blue);
        }
        .icon-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .icon-btn:hover {
            background: var(--surface-3);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        /* --- Filter bar (pill + dropdown style) --- */
        .filters {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 4px;
            font-weight: 500;
        }
        .pill {
            background: var(--surface-2);
            color: var(--text-secondary);
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 11.5px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .pill:hover {
            background: var(--surface-3);
            color: var(--text-primary);
        }
        .pill.active {
            background: var(--accent-blue);
            color: #fff;
        }
        select.modern-select {
            background: var(--surface-2);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        select.modern-select:hover {
            border-color: var(--border-hover);
        }

        /* --- Main content --- */
        main.content {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: auto;
        }

        /* --- Metric cards --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        @media (max-width: 900px) {
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .metric-card {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .metric-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }
        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }
        .metric-value.pass { color: var(--accent-green); }
        .metric-value.fail { color: var(--accent-red); }
        .metric-value.warn { color: var(--accent-yellow); }
        .metric-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* --- Section card --- */
        .section {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.01em;
        }
        .section-subtitle {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* --- Table --- */
        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        table.modern {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
        }
        table.modern th {
            background: var(--surface-2);
            color: var(--text-muted);
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        table.modern td {
            padding: 7px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            vertical-align: top;
        }
        table.modern tbody tr:nth-child(even) { background: var(--row-alt); }
        table.modern tbody tr:last-child td { border-bottom: 0; }
        table.modern tbody tr.fail-row { background: var(--row-fail); }
        table.modern tbody tr:hover { background: var(--surface-2); }

        td.mono, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        td.num, .num { font-variant-numeric: tabular-nums; text-align: right; }
        .muted { color: var(--text-muted); }
        .secondary { color: var(--text-secondary); }

        /* --- Status badges --- */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge.pass { background: rgba(78,173,122,0.18); color: var(--accent-green); }
        .badge.fail { background: rgba(214,93,93,0.18); color: var(--accent-red); }
        .badge.skip, .badge.skipped { background: rgba(201,162,39,0.18); color: var(--accent-yellow); }
        .badge.error { background: rgba(217,138,78,0.20); color: var(--accent-orange); }

        /* --- Results bar (mini pass/fail visualization) --- */
        .results-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
        }
        .bar-track {
            flex: 1;
            height: 6px;
            background: var(--surface-3);
            border-radius: 3px;
            overflow: hidden;
            display: flex;
        }
        .bar-track .seg-pass { background: var(--accent-green); height: 100%; }
        .bar-track .seg-fail { background: var(--accent-red); height: 100%; }
        .bar-track .seg-err  { background: var(--accent-orange); height: 100%; }
        .bar-track .seg-skip { background: var(--accent-yellow); height: 100%; }
        .bar-nums {
            font-size: 10.5px;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
            white-space: nowrap;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        /* --- Expand details --- */
        details.row-details summary {
            cursor: pointer;
            font-size: 11px;
            color: var(--accent-blue);
            list-style: none;
            user-select: none;
            font-weight: 500;
        }
        details.row-details summary::-webkit-details-marker { display: none; }
        details.row-details summary:hover { text-decoration: underline; }
        .nested-wrap {
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        table.nested {
            width: 100%;
            border-collapse: collapse;
            font-size: 11.5px;
        }
        table.nested th {
            background: var(--surface-3);
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 6px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        table.nested td {
            padding: 5px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }
        table.nested tr:last-child td { border-bottom: 0; }

        /* Empty / loading state */
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Compact scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--surface-0); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
    </style>
</head>

<body class="dark">
    <div class="container">
        <header class="topbar">
            <div class="topbar-row" style="margin-bottom: 10px;">
                <div class="page-title">
                    <span class="dot"></span>
                    Community sonic-mgmt Test Results
                </div>
                <div style="margin-left:auto; display:flex; gap:8px;">
                    <button class="icon-btn" id="themeToggle" title="Toggle theme">🌙 Dark</button>
                </div>
            </div>
            <div class="topbar-row" id="filterContainer"></div>
        </header>

        <main class="content">
            <div id="metricsRow"></div>
            <div id="resultsSection"></div>
        </main>
    </div>

    <script>
        var branches = [
            "main",
            "202511",
            "202505",
        ];

        var columns = [
            ["Time", "time"],
        ];

        columns = columns.concat([
            ["Format", "format"],
            ["Org", "org"],
            ["Branch", "branch"],
            ["Build", "os_version"],
            ["Testbed", "testbed"],
            ["Topo", "topology"],
            ["Sku", "platform"],
            ["File", "file"],
            ["Duration", "duration"],
            ["Total", "total_testcases"],
            ["Error", "error_testcases"],
            ["Fail", "failed_testcases"],
            ["Skip", "skipped_testcases"],
            ["Testcases", "testcase_statuses"],
        ]);

        var records_json_urls = [];
        var branch_results_dict = {};

        var branch_and_results_tuples_list = [];
        var branch_regressions = [];
        var records_json_failed = [];
        var records_json_contents = [];

        const branchList = [
            "any",
            "main",
            "202511",
            "202505",
        ];
        var branch_choice = "any";

        const orgList = [
            "any",
            "org1",
        ];
        var org_choice = "any";

        const topoList = [
            "any",
            "t0",
            "t1",
            "t2",
        ];
        var topo_choice = "any";

        const resultsList = [
            "any",
            "Regression",
            "Fail",
            "Pass",
        ];
        var results_status_choice = "any";

        const timeWindowList = [
            "1 day",
            "1 week",
            "2 week",
            "6 week",
            "6 month",
        ];
        var time_window_choice = "6 week";
        const timeWindowToNumDays = {
            "1 day": 1,
            "1 week": 7,
            "2 week": 14,
            "6 week": 42,
            "6 month": 180,
        };

        var timeThresholds = {
            "num_weeks_to_query" : 6,
            "num_days_to_display" : 42,
            "dates_to_query_list" : [],
            "dates_to_display_list" : [],
        };

        var display_pending = 1;

        function gettimestampstring() {
            return new Date().toISOString().replace('T', ' ').replace('Z', '') + ' ';
        }

        function generateDateStrings(numDays, includeYear) {
            var date_strings = [];
            var now = new Date();
            var utcNow = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
            for (var i = 0; i < (numDays + 1); i++) {
                var date = new Date(utcNow.getFullYear(), utcNow.getMonth(), utcNow.getDate() - i + 1);
                var date_string = date.getFullYear() + "/" + (date.getMonth() + 1) + "/" + date.getDate();
                if (!includeYear) {
                    date_string = date_string.substring(5);
                }
                date_strings.push(date_string);
            }
           console.log(gettimestampstring() + "date_strings: ", date_strings);
           return date_strings;
        }

        function generateWeeklyDateStrings(numWeeks) {
            var week_strings = [];
            var now = new Date();
            var utcNow = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));

            for (var i = 0; i < numWeeks; i++) {
                var weeksBack = new Date(utcNow.getFullYear(), utcNow.getMonth(), utcNow.getDate() - (i * 7));
                var year = weeksBack.getFullYear();
                var month = weeksBack.getMonth() + 1;

                var monthStr = month < 10 ? "0" + month : "" + month;

                var dayOfMonth = weeksBack.getDate();
                var weekOfMonth = Math.ceil(dayOfMonth / 7);

                var week_string = year + "/" + monthStr + "/week" + weekOfMonth;
                week_strings.push(week_string);
            }

            console.log(gettimestampstring() + "week_strings: ", week_strings);
            return week_strings;
        }

        function dateToWeekFormat(dateStr) {
            var parts = dateStr.split("/");
            var month = parseInt(parts[0]);
            var day = parseInt(parts[1]);

            var now = new Date();
            var currentMonth = now.getMonth() + 1;
            var year = now.getFullYear();

            if (month > currentMonth) {
                year = year - 1;
            }

            var monthStr = month < 10 ? "0" + month : "" + month;

            var weekOfMonth = Math.ceil(day / 7);

            return year + "/" + monthStr + "/week" + weekOfMonth;
        }

        function generateResultFileURLs() {
            var url_prefix = "https://raw.githubusercontent.com/rohsh/testrepo/main/data/";
            timeThresholds.dates_to_query_list.forEach(function(date_string) {
                for (var j = 0; j < orgList.length; j++) {
                    org = orgList[j];
                    if (org == "any") {
                        continue;
                    }
                    var url = url_prefix + org + "/" + date_string + "/results.json";
                    records_json_urls.push(url);
                }
            });
            console.log(gettimestampstring() + "records_json_urls: ", records_json_urls);
        }

        function getResultFileContents() {
            console.log(gettimestampstring() + "getResultFileContents() for ", records_json_urls.length, " files");
            records_json_urls.forEach(function(url) {
                fetch(url)
                    .then(response => {
                        if (response.ok) {
                            return response.text();
                        } else {
                            return Promise.reject({ status: response.status, url: url });
                        }
                    })
                    .then(text => {
                        try {
                            const data = JSON.parse(text);
                            records_json_contents.push(data);
                            console.log(gettimestampstring() + "Parsed JSON data from", url);
                        } catch (e) {
                            records_json_failed.push(url);
                        }
                        display_pending = 1;
                    })
                    .catch(error => {
                        if (error.status === 404) {
                            console.log(gettimestampstring() + "File not found (404):", error.url);
                        } else if (error.status) {
                            console.log(gettimestampstring() + "HTTP error", error.status, "for", error.url);
                        } else {
                            console.log(gettimestampstring() + "Fetch error for", url, ":", error.message || error);
                        }
                        records_json_failed.push(url);
                        display_pending = 1;
                    });
            });
        }

        function generateBranchResults() {
            branch_results_dict = {};
            for (var i = 0; i < records_json_contents.length; i++) {
                var data = records_json_contents[i];
                data.forEach(function(entry) {
                    if (entry.format != "v1") {
                        console.log(gettimestampstring() + "entry.format !== 'v1': ", entry);
                        return;
                    }

                    var branch = entry.branch;
                    if (!(branch in branch_results_dict)) {
                        branch_results_dict[branch] = [];
                    }

                    if (branch_choice != "any" && entry.branch != branch_choice) {
                        return;
                    }

                    if (org_choice != "any" && entry.org != org_choice) {
                        return;
                    }

                    if (topo_choice != "any" && !entry.topology.startsWith(topo_choice)) {
                        return;
                    }

                    if (results_status_choice != "any") {
                        var failed_run = (parseInt(entry.failed_testcases || 0) > 0) || (parseInt(entry.error_testcases || 0) > 0);
                        if (results_status_choice == "Pass" && failed_run) {
                            return;
                        }

                        if (results_status_choice == "Fail" && !failed_run) {
                            return;
                        }
                    }

                    var entryDate = new Date(entry.time.split(" ")[0]);
                    var now = new Date();
                    var daysDiff = Math.floor((now - entryDate) / (1000 * 60 * 60 * 24));
                    if (daysDiff >= timeThresholds["num_days_to_display"]) {
                        return;
                    }

                    branch_results_dict[branch].push(entry);
                });
            }

            branch_and_results_tuples_list =
                Object.entries(branch_results_dict).map(([branch, results]) => {
                    return [branch, results.sort((a, b) => new Date(b.time) - new Date(a.time))];
                });

            var rearranged_branch_and_results_tuples_list = [];
            branches.forEach(function(branch) {
                branch_and_results_tuples_list.forEach(function(branch_and_results) {
                    if (branch_and_results[0] == branch) {
                        rearranged_branch_and_results_tuples_list.push(branch_and_results);
                    }
                });
            });
            branch_and_results_tuples_list = rearranged_branch_and_results_tuples_list;

            branch_and_results_tuples_list.forEach(function(branch_and_results) {
                console.log(gettimestampstring() + "branch: ", branch_and_results[0], " num_results: ", branch_and_results[1].length);
            });

            branch_regressions = {};
            for (var i = 0; i < branch_and_results_tuples_list.length; i++) {
                var branch = branch_and_results_tuples_list[i][0];
                branch_regressions[branch] = {};

                var results = branch_and_results_tuples_list[i][1];
                results.forEach(function(entry) {
                    var filename = entry.file;
                    var topo = entry.topology;

                    if (!(filename in branch_regressions[branch])) {
                        branch_regressions[branch][filename] = {};
                    }
                    if (!(topo in branch_regressions[branch][filename])) {
                        branch_regressions[branch][filename][topo] = {};
                        branch_regressions[branch][filename][topo]["regression_status"] = false;
                        branch_regressions[branch][filename][topo]["entries"] = [entry];
                    } else if (branch_regressions[branch][filename][topo]["entries"].length == 1) {
                        var recent_entry = branch_regressions[branch][filename][topo]["entries"][0];
                        branch_regressions[branch][filename][topo]["entries"].push(entry);

                        var recent_entry_failed_run = (parseInt(recent_entry.failed_testcases || 0) > 0) || (parseInt(recent_entry.error_testcases || 0) > 0);
                        var current_entry_failed_run = (parseInt(entry.failed_testcases || 0) > 0) || (parseInt(entry.error_testcases || 0) > 0);
                        if (recent_entry_failed_run && !current_entry_failed_run) {
                            branch_regressions[branch][filename][topo]["regression_status"] = true;
                            branch_regressions[branch][filename][topo]["entries"] = [];
                        }
                    }
                });
            }

            for (var branch in branch_regressions) {
                let regression_count = 0;
                for (var filename in branch_regressions[branch]) {
                    for (var topo in branch_regressions[branch][filename]) {
                        if (branch_regressions[branch][filename][topo]["regression_status"]) {
                            regression_count += 1;
                        }
                    }
                }
                if (regression_count > 0) {
                    console.log(gettimestampstring() + "#regressions in", branch, ":", regression_count);
                }
            }

            if (results_status_choice == "Regression") {
                console.log(gettimestampstring() + "results_status_choice == Regression");
                branch_and_results_tuples_list_regression_filtered = [];
                for (var i = 0; i < branch_and_results_tuples_list.length; i++) {
                    var branch = branch_and_results_tuples_list[i][0];
                    var results = branch_and_results_tuples_list[i][1];
                    var results_regression_filtered = [];
                    results.forEach(function(entry) {
                        var filename = entry.file;
                        var topo = entry.topology;
                        if (branch_regressions[branch][filename][topo]["regression_status"]) {
                            if (branch_regressions[branch][filename][topo]["entries"].length < 2) {
                                branch_regressions[branch][filename][topo]["entries"].push(entry);
                                results_regression_filtered.push(entry);
                            }
                        }
                    });
                    branch_and_results_tuples_list_regression_filtered.push([branch, results_regression_filtered]);
                }
                branch_and_results_tuples_list = branch_and_results_tuples_list_regression_filtered;
                console.log(gettimestampstring() + "branch_and_results_tuples_list_regression_filtered: ", branch_and_results_tuples_list_regression_filtered);
            };
        }

        /* ---------- UI: Filter bar ---------- */
        function makeDropdownGroup(label, optionsArr, currentValue, onChange) {
            var group = document.createElement("div");
            group.className = "filter-group";

            var lbl = document.createElement("span");
            lbl.className = "filter-label";
            lbl.textContent = label;
            group.appendChild(lbl);

            var sel = document.createElement("select");
            sel.className = "modern-select";
            optionsArr.forEach(function(opt) {
                var optEl = document.createElement("option");
                optEl.value = opt;
                optEl.textContent = opt;
                if (opt === currentValue) optEl.selected = true;
                sel.appendChild(optEl);
            });
            sel.addEventListener("change", function() {
                onChange(sel.value);
                display_pending = 1;
            });
            group.appendChild(sel);
            return group;
        }

        function makePillGroup(label, optionsArr, currentValue, onChange) {
            var group = document.createElement("div");
            group.className = "filter-group";

            var lbl = document.createElement("span");
            lbl.className = "filter-label";
            lbl.textContent = label;
            group.appendChild(lbl);

            optionsArr.forEach(function(opt) {
                var btn = document.createElement("button");
                btn.className = "pill" + (opt === currentValue ? " active" : "");
                btn.textContent = opt;
                btn.addEventListener("click", function() {
                    onChange(opt);
                    display_pending = 1;
                });
                group.appendChild(btn);
            });
            return group;
        }

        function filtersRender() {
            var filterContainer = document.getElementById("filterContainer");
            filterContainer.innerHTML = '';

            var filtersWrap = document.createElement("div");
            filtersWrap.className = "filters";

            filtersWrap.appendChild(makeDropdownGroup(
                "Duration", timeWindowList, time_window_choice,
                function(v) {
                    time_window_choice = v;
                    timeThresholds["num_days_to_display"] = timeWindowToNumDays[v];
                }
            ));
            filtersWrap.appendChild(makeDropdownGroup(
                "Branch", branchList, branch_choice,
                function(v) { branch_choice = v; }
            ));
            filtersWrap.appendChild(makeDropdownGroup(
                "Topology", topoList, topo_choice,
                function(v) { topo_choice = v; }
            ));
            filtersWrap.appendChild(makeDropdownGroup(
                "Status", resultsList, results_status_choice,
                function(v) { results_status_choice = v; }
            ));
            filtersWrap.appendChild(makeDropdownGroup(
                "Org", orgList, org_choice,
                function(v) { org_choice = v; }
            ));
            filterContainer.appendChild(filtersWrap);
        }

        /* ---------- UI: Metrics ---------- */
        function metricsRender(allResults) {
            var container = document.getElementById("metricsRow");
            container.innerHTML = '';

            var totalRuns = allResults.length;
            var totalPassed = 0, totalFailed = 0, totalError = 0, totalSkipped = 0;
            var failedRuns = 0;
            allResults.forEach(function(e) {
                var f = parseInt(e.failed_testcases || 0);
                var er = parseInt(e.error_testcases || 0);
                var s = parseInt(e.skipped_testcases || 0);
                var t = parseInt(e.total_testcases || 0);
                var p = Math.max(0, t - f - er - s);
                totalPassed += p; totalFailed += f; totalError += er; totalSkipped += s;
                if (f > 0 || er > 0) failedRuns += 1;
            });
            var denom = totalPassed + totalFailed + totalError;
            var passRate = denom > 0 ? (totalPassed / denom * 100) : 0;
            var rateClass = passRate >= 90 ? 'pass' : passRate >= 70 ? 'warn' : 'fail';

            var regressionCount = 0;
            for (var br in branch_regressions) {
                for (var fn in branch_regressions[br]) {
                    for (var tp in branch_regressions[br][fn]) {
                        if (branch_regressions[br][fn][tp]["regression_status"]) regressionCount++;
                    }
                }
            }

            var grid = document.createElement("div");
            grid.className = "metrics-grid";

            function card(title, value, sub, cls) {
                var c = document.createElement("div");
                c.className = "metric-card";
                c.innerHTML =
                    '<div class="metric-title">' + title + '</div>' +
                    '<div class="metric-value' + (cls ? ' ' + cls : '') + '">' + value + '</div>' +
                    (sub ? '<div class="metric-sub">' + sub + '</div>' : '');
                return c;
            }

            grid.appendChild(card("Total Runs", totalRuns.toLocaleString(), "Duration: " + time_window_choice));
            grid.appendChild(card("Pass Rate", passRate.toFixed(1) + "%", totalPassed.toLocaleString() + " / " + denom.toLocaleString() + " TCs", rateClass));
            grid.appendChild(card("Failed Runs", failedRuns.toLocaleString(), totalFailed.toLocaleString() + " fails, " + totalError.toLocaleString() + " errors", failedRuns > 0 ? 'fail' : ''));
            grid.appendChild(card("Regressions", regressionCount.toLocaleString(), "Recent passes following failures", regressionCount > 0 ? 'warn' : ''));

            container.appendChild(grid);
        }

        /* ---------- UI: Results table ---------- */
        function statusBadge(statusRaw) {
            var s = String(statusRaw || '').toUpperCase();
            var cls = s.toLowerCase();
            if (!['PASS','FAIL','SKIP','SKIPPED','ERROR'].includes(s)) cls = '';
            return '<span class="badge ' + cls + '">' + (statusRaw || '—') + '</span>';
        }

        function makeResultsBar(entry) {
            var total = parseInt(entry.total_testcases || 0);
            var fail = parseInt(entry.failed_testcases || 0);
            var err = parseInt(entry.error_testcases || 0);
            var skip = parseInt(entry.skipped_testcases || 0);
            var pass = Math.max(0, total - fail - err - skip);
            if (total === 0) {
                return '<span class="muted">—</span>';
            }
            var pPct = (pass/total)*100, fPct = (fail/total)*100, ePct = (err/total)*100, sPct = (skip/total)*100;
            var html = '<div class="results-bar" title="' + pass + 'P ' + fail + 'F ' + err + 'E ' + skip + 'S / ' + total + '">';
            html += '<div class="bar-track">';
            if (pPct > 0) html += '<div class="seg-pass" style="width:' + pPct + '%"></div>';
            if (fPct > 0) html += '<div class="seg-fail" style="width:' + fPct + '%"></div>';
            if (ePct > 0) html += '<div class="seg-err"  style="width:' + ePct + '%"></div>';
            if (sPct > 0) html += '<div class="seg-skip" style="width:' + sPct + '%"></div>';
            html += '</div>';
            html += '<span class="bar-nums">';
            html += '<span style="color:var(--accent-green)">' + pass + '</span>';
            if (fail > 0) html += '<span style="color:var(--accent-red)">/' + fail + '</span>';
            if (err > 0)  html += '<span style="color:var(--accent-orange)">/' + err + '</span>';
            html += '<span class="muted">/' + total + '</span>';
            html += '</span></div>';
            return html;
        }

        function branchResultsRender() {
            var section = document.getElementById("resultsSection");
            section.innerHTML = '';

            var allResults = [];
            for (var i = 0; i < branch_and_results_tuples_list.length; i++) {
                var branch = branch_and_results_tuples_list[i][0];
                var results = branch_and_results_tuples_list[i][1];
                if (!branches.includes(branch)) continue;
                allResults = allResults.concat(results);
            }
            allResults.sort((a, b) => new Date(b.time) - new Date(a.time));

            // render metrics first
            metricsRender(allResults);

            // Card wrapper for the table
            var card = document.createElement("div");
            card.className = "section";

            var header = document.createElement("div");
            header.className = "section-header";
            header.innerHTML =
                '<div class="section-title">Test Results</div>' +
                '<div class="section-subtitle">' + allResults.length.toLocaleString() + ' runs</div>';
            card.appendChild(header);

            if (allResults.length === 0) {
                var empty = document.createElement("div");
                empty.className = "empty-state";
                empty.textContent = "No test results match the current filters.";
                card.appendChild(empty);
                section.appendChild(card);
                return;
            }

            var wrap = document.createElement("div");
            wrap.className = "table-wrap";

            var table = document.createElement("table");
            table.className = "modern";

            var thead = document.createElement("thead");
            var headerRow = document.createElement("tr");
            var headers = ["Status", "Time", "Branch", "Org", "File", "Build", "Topo", "Sku", "Duration", "Results", "Testcases"];
            headers.forEach(function(h) {
                var th = document.createElement("th");
                th.textContent = h;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            var tbody = document.createElement("tbody");

            allResults.forEach(function(entry) {
                var failed_run = (parseInt(entry.failed_testcases || 0) > 0) || (parseInt(entry.error_testcases || 0) > 0);
                var row = document.createElement("tr");
                if (failed_run) row.className = 'fail-row';

                // Status badge
                var statusCell = document.createElement("td");
                statusCell.innerHTML = statusBadge(failed_run ? 'FAIL' : 'PASS');
                row.appendChild(statusCell);

                // Time
                var timeCell = document.createElement("td");
                timeCell.className = "mono muted";
                timeCell.style.whiteSpace = "nowrap";
                timeCell.textContent = entry.time ? entry.time.substring(5) : '';
                row.appendChild(timeCell);

                // Branch
                var branchCell = document.createElement("td");
                branchCell.className = "mono secondary";
                branchCell.textContent = entry.branch || '';
                row.appendChild(branchCell);

                // Org
                var orgCell = document.createElement("td");
                orgCell.className = "muted";
                orgCell.textContent = entry.org || '';
                row.appendChild(orgCell);

                // File
                var fileCell = document.createElement("td");
                fileCell.className = "mono";
                fileCell.title = entry.file || '';
                fileCell.style.maxWidth = "260px";
                fileCell.style.overflow = "hidden";
                fileCell.style.textOverflow = "ellipsis";
                fileCell.style.whiteSpace = "nowrap";
                fileCell.textContent = entry.file || '';
                row.appendChild(fileCell);

                // Build
                var buildCell = document.createElement("td");
                buildCell.className = "mono muted";
                buildCell.textContent = entry.os_version || '';
                row.appendChild(buildCell);

                // Topo
                var topoCell = document.createElement("td");
                topoCell.className = "secondary";
                topoCell.textContent = entry.topology || '';
                row.appendChild(topoCell);

                // Sku
                var skuCell = document.createElement("td");
                skuCell.className = "muted";
                skuCell.textContent = entry.hwsku || '';
                row.appendChild(skuCell);

                // Duration
                var durationCell = document.createElement("td");
                durationCell.className = "num muted";
                durationCell.textContent = entry.duration || '';
                row.appendChild(durationCell);

                // Results bar (replaces separate Total / Error / Fail / Skip columns)
                var resultsCell = document.createElement("td");
                resultsCell.innerHTML = makeResultsBar(entry);
                row.appendChild(resultsCell);

                // Testcases expand/collapse
                var tcCell = document.createElement("td");
                var details = document.createElement("details");
                details.className = "row-details";
                var summary = document.createElement("summary");
                summary.textContent = "▸ Expand";
                details.appendChild(summary);
                details.addEventListener('toggle', function() {
                    summary.textContent = details.open ? "▾ Collapse" : "▸ Expand";
                });

                var nestedWrap = document.createElement("div");
                nestedWrap.className = "nested-wrap";

                var nestedTable = document.createElement("table");
                nestedTable.className = "nested";

                var nhead = document.createElement("thead");
                var nhRow = document.createElement("tr");
                ["Testcase", "Status"].forEach(function(h) {
                    var th = document.createElement("th");
                    th.textContent = h;
                    nhRow.appendChild(th);
                });
                nhead.appendChild(nhRow);
                nestedTable.appendChild(nhead);

                var nbody = document.createElement("tbody");
                if (entry.testcase_statuses && Array.isArray(entry.testcase_statuses)) {
                    // sort: failures first
                    var sorted = entry.testcase_statuses.slice().sort(function(a, b) {
                        var order = { 'fail': 0, 'error': 1, 'skip': 2, 'skipped': 2, 'pass': 3 };
                        var ao = order[(a[1]||'').toLowerCase()] ?? 4;
                        var bo = order[(b[1]||'').toLowerCase()] ?? 4;
                        return ao - bo;
                    });
                    sorted.forEach(function(tc) {
                        var tr = document.createElement("tr");
                        var nameTd = document.createElement("td");
                        nameTd.className = "mono";
                        nameTd.textContent = tc[0];
                        var statusTd = document.createElement("td");
                        statusTd.innerHTML = statusBadge(tc[1]);
                        tr.appendChild(nameTd);
                        tr.appendChild(statusTd);
                        nbody.appendChild(tr);
                    });
                }
                nestedTable.appendChild(nbody);
                nestedWrap.appendChild(nestedTable);
                details.appendChild(nestedWrap);
                tcCell.appendChild(details);
                row.appendChild(tcCell);

                tbody.appendChild(row);
            });

            table.appendChild(tbody);
            wrap.appendChild(table);
            card.appendChild(wrap);
            section.appendChild(card);
        }

        function renderAll() {
            console.log(gettimestampstring() + "renderAll()");

            generateBranchResults();

            filtersRender();
            branchResultsRender();
            display_pending = 0;
            console.log(gettimestampstring() + "display_pending: ", display_pending);
        }

        function doMaybeRenderAll() {
            try {
                if (display_pending) {
                    renderAll();
                }
            } catch (e) {
                console.log("Error: ", e);
            }
        }

        /* ---------- Theme toggle ---------- */
        function setupThemeToggle() {
            var btn = document.getElementById('themeToggle');
            var saved = localStorage.getItem('sonicmgmt-theme') || 'dark';
            document.body.className = saved;
            btn.textContent = saved === 'dark' ? '🌙 Dark' : '☀ Light';
            btn.addEventListener('click', function() {
                var next = document.body.classList.contains('dark') ? 'light' : 'dark';
                document.body.className = next;
                btn.textContent = next === 'dark' ? '🌙 Dark' : '☀ Light';
                localStorage.setItem('sonicmgmt-theme', next);
            });
        }

        timeThresholds["dates_to_query_list"] = generateWeeklyDateStrings(timeThresholds["num_weeks_to_query"]);
        console.log(gettimestampstring() + "num_days_to_display: ", timeThresholds["num_days_to_display"]);
        generateResultFileURLs();
        getResultFileContents();

        window.onload = function () {
            console.log(gettimestampstring() + "window.onload");
            setupThemeToggle();
            doMaybeRenderAll();

            setInterval(function() {
                doMaybeRenderAll();
            }, 250);
        }
    </script>
</body>
